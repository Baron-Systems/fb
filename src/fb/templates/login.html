<!doctype html>
<html lang="ar" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تسجيل الدخول - Backup Dashboard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background: #fafafa;
        color: #222;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .login-box {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 2rem;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      }
      .login-title {
        font-size: 1.35rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .login-subtitle {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 0.35rem;
      }
      .form-group input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
      }
      .form-group input:focus {
        outline: none;
        border-color: #0066cc;
        box-shadow: 0 0 0 2px rgba(0,102,204,0.15);
      }
      .btn {
        padding: 0.6rem 1.2rem;
        border-radius: 4px;
        border: 1px solid #ddd;
        background: #fff;
        cursor: pointer;
        font-size: 0.95rem;
        text-decoration: none;
        display: inline-block;
        color: #333;
      }
      .btn-primary {
        background: #0066cc;
        color: #fff;
        border-color: #0066cc;
        width: 100%;
        margin-top: 0.5rem;
      }
      .btn-primary:hover {
        background: #0052a3;
        border-color: #0052a3;
      }
      .error-msg {
        background: #fee;
        color: #c00;
        padding: 0.6rem 0.75rem;
        border-radius: 4px;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <div class="login-title">💾 Backup Dashboard</div>
      <div class="login-subtitle">أدخل كلمة المرور للدخول</div>

      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <input type="hidden" name="next_path" value="{{ next }}" />
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" name="password" required placeholder="Password" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary">دخول</button>
      </form>
    </div>
  </body>
</html>
